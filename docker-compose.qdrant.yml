version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: agent_rag_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:6333/dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  qdrant_storage:
