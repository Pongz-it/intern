version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: agent_rag_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agent_rag
    ports:
      - "5432:5432"
    volumes:
      - ./scripts/init_messages_table.sql:/docker-entrypoint-initdb.d/01-init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agent_rag"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
